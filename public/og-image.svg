<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F8F7F4"/>

  <!-- Subtle pattern circles -->
  <circle cx="950" cy="80" r="200" fill="#F0EDE8" opacity="0.5"/>
  <circle cx="150" cy="550" r="160" fill="#F0EDE8" opacity="0.4"/>
  <circle cx="1100" cy="500" r="120" fill="#DDE5D3" opacity="0.2"/>

  <!-- Logo square -->
  <rect x="530" y="120" width="140" height="140" rx="36" fill="#1A1A1A"/>
  <text x="600" y="210" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="700" font-size="80" fill="#DDE5D3">A</text>

  <!-- App name -->
  <text x="600" y="340" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="700" font-size="64" fill="#1A1A1A" letter-spacing="-1">Anera</text>

  <!-- Tagline -->
  <text x="600" y="395" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="500" font-size="28" fill="#6F6F6F">Your personal AI wardrobe stylist</text>

  <!-- Decorative divider -->
  <line x1="440" y1="430" x2="760" y2="430" stroke="#D4D4D4" stroke-width="1" stroke-linecap="round"/>

  <!-- Feature pills -->
  <rect x="295" y="465" width="150" height="44" rx="22" fill="#F0EDE8"/>
  <text x="370" y="493" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="600" font-size="16" fill="#6F6F6F">Organise</text>

  <rect x="475" y="465" width="110" height="44" rx="22" fill="#DDE5D3"/>
  <text x="530" y="493" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="600" font-size="16" fill="#4A5A38">Style</text>

  <rect x="615" y="465" width="140" height="44" rx="22" fill="#F0EDE8"/>
  <text x="685" y="493" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="600" font-size="16" fill="#6F6F6F">Discover</text>

  <rect x="785" y="465" width="120" height="44" rx="22" fill="#DDE5D3"/>
  <text x="845" y="493" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="600" font-size="16" fill="#4A5A38">Buy</text>
</svg>
