<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Anera – Your personal stylist for conscious fashion</title>

    <!-- PWA Meta -->
    <meta name="theme-color" content="#F5F0EB" />
    <meta name="description" content="Your personal stylist for conscious fashion. Organise, style, and make smarter choices." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Anera" />

    <!-- Icons — timestamp cache-bust to force browser refresh -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260401b" />
    <link rel="shortcut icon" type="image/svg+xml" href="/favicon.svg?v=20260401b" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg?v=20260401b" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json?v=20260401b" />

    <!-- Node.js polyfill for Anthropic SDK -->
    <script>window.process = window.process || { env: {}, version: '', versions: {} };</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
